packages: []
allowBuilds:
  unrs-resolver: false
minimumReleaseAge: 10080
# Allow urgent security patches before the 7-day cooldown (e.g. axios GHSA-3p68-rc4w-qgx5).
minimumReleaseAgeExclude:
  - axios
  - follow-redirects
  - form-data
  - '@babel/core'
  - js-yaml
overrides:
  '@babel/core': 8.0.1
  js-yaml: 4.3.0
  form-data: 4.0.6
  follow-redirects: ^1.16.0
  # GHSA (brace-expansion DoS): scoped per major so each consumer keeps
  # its own major line.
  'brace-expansion@>=3.0.0 <5.0.7': ^5.0.7
  'brace-expansion@<1.1.16': ^1.1.16
  'brace-expansion@>=2.0.0 <2.1.2': ^2.1.2
