packages: []
allowBuilds:
  unrs-resolver: false
minimumReleaseAge: 10080
# Allow urgent security patches before the 7-day cooldown (e.g. axios GHSA-3p68-rc4w-qgx5).
minimumReleaseAgeExclude:
  - axios
  - follow-redirects
  - form-data
  - '@babel/core'
  - js-yaml
overrides:
  '@babel/core': 8.0.1
  js-yaml: 4.3.0
  form-data: 4.0.6
  follow-redirects: ^1.16.0
  # GHSA (brace-expansion DoS): scoped to the vulnerable range so the
  # 1.x and 2.x consumers keep their own majors.
  'brace-expansion@>=3.0.0 <5.0.7': ^5.0.7
